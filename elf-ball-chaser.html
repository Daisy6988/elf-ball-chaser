<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Man Slide Right</title>
    <style>
        .container {
            position: relative;
            width: 600px;
            height: 300px;
            background: #eaeaea;
            border: 2px solid #333;
            overflow: hidden;
            margin: 20px;
        }

        .ball {
            position: absolute;
            width: 30px;
            height: 30px;
            background-color: orange;
            border-radius: 50%;
            left: 450px;
            top: 135px;
            z-index: 10;
            cursor: pointer;
        }

        .man {
            position: absolute;
            width: 0;
            height: 0;
            top: 100px;
            border-right: 50px solid transparent;
            border-top: 50px solid #2d2d5a;
            border-left: 50px solid #2d2d5a;
            border-bottom: 50px solid #2d2d5a;
            border-radius: 50%;
        
            animation: slide 6s infinite linear;
        }

        .man::after {
            content: "";
            position: absolute;
            width: 12px;
            height: 12px;
            background-color:plum;
            border-radius: 50%;
            top: -25px;
            left: -10px;
           
        }
     
        @keyframes slide {
            0%, 100% {
                left: 20px;
            }
            50% {
                left: 350px;
            }
        }
        
        .ball:hover + .man {
            animation: none;
            left: 360px;    
            top: 95px;
        }

        .ball:hover + .man::after {
            display: none; 
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="ball"></div>
        <div class="man"></div>
    </div>
</body>
</html>
